name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (ignored when store is set)'
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      store:
        description: 'Which store to submit to'
        required: false
        default: all
        type: choice
        options:
          - all
          - chrome
          - firefox
          - edge

jobs:
  prepare:
    if: inputs.store == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          node scripts/version.js ${{ inputs.version_type }}
          VERSION=$(node scripts/version.js get)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add src/manifest.json
          git add "safari/Isometric Contributions/Isometric Contributions Extension/Resources/manifest.json"
          git add "safari/Isometric Contributions/Isometric Contributions.xcodeproj/project.pbxproj"
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"

      - name: Push changes
        run: |
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.version }}"

  # safari:
  #   needs: prepare
  #   uses: ./.github/workflows/release-safari.yml
  #   with:
  #     ref: v${{ needs.prepare.outputs.version }}
  #   secrets: inherit

  release:
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.version && format('v{0}', needs.prepare.outputs.version) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all browsers
        run: npm run build:all

      - name: Submit to Chrome Web Store
        if: inputs.store == 'all' || inputs.store == 'chrome'
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: npm run submit:chrome

      - name: Submit to Firefox Add-ons
        if: inputs.store == 'all' || inputs.store == 'firefox'
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: npm run submit:firefox

      - name: Submit to Edge Add-ons
        if: inputs.store == 'all' || inputs.store == 'edge'
        continue-on-error: ${{ inputs.store == 'all' }}
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: npm run submit:edge

      - name: Create GitHub Release
        if: inputs.store == 'all'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/isometric-contributions-chrome.zip
            artifacts/isometric-contributions-edge.zip
            artifacts/isometric-contributions-firefox.zip
