name: Release Safari

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to build (tag or SHA)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      XCODEPROJ: safari/Isometric Contributions/Isometric Contributions.xcodeproj
      SCHEME: Isometric Contributions
      ARCHIVE_PATH: .deriveddata-safari/IsometricContributions.xcarchive
      KEYCHAIN_PATH: /tmp/isometric-contributions-build.keychain-db

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build extension and sync resources
        run: node scripts/build-safari.js --resources-only

      - name: Import signing certificates
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_BASE64 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_INSTALLER_CERT_BASE64"
          test -n "$APPLE_INSTALLER_CERT_PASSWORD"

          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Apple Distribution certificate (signs the app)
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 -D > /tmp/distribution.p12
          security import /tmp/distribution.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A

          # Import Mac Installer Distribution certificate (signs the .pkg)
          printf '%s' "$APPLE_INSTALLER_CERT_BASE64" | base64 -D > /tmp/installer.p12
          security import /tmp/installer.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_INSTALLER_CERT_PASSWORD" \
            -A

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Install provisioning profiles
        env:
          PROVISIONING_PROFILE_APP_BASE64: ${{ secrets.PROVISIONING_PROFILE_APP_BASE64 }}
          PROVISIONING_PROFILE_EXT_BASE64: ${{ secrets.PROVISIONING_PROFILE_EXT_BASE64 }}
        run: |
          test -n "$PROVISIONING_PROFILE_APP_BASE64"
          test -n "$PROVISIONING_PROFILE_EXT_BASE64"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          printf '%s' "$PROVISIONING_PROFILE_APP_BASE64" | base64 -D \
            > ~/Library/MobileDevice/Provisioning\ Profiles/app.provisionprofile
          printf '%s' "$PROVISIONING_PROFILE_EXT_BASE64" | base64 -D \
            > ~/Library/MobileDevice/Provisioning\ Profiles/extension.provisionprofile

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          test -n "$ASC_API_KEY_BASE64"
          test -n "$ASC_API_KEY_ID"

          mkdir -p ~/.private_keys
          printf '%s' "$ASC_API_KEY_BASE64" | base64 -D \
            > ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO

      - name: Build installer package
        run: |
          set -x
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Isometric Contributions.app"

          echo "=== Archive contents ==="
          find "$ARCHIVE_PATH/Products" -maxdepth 3 -type d || true

          echo "=== Embedding provisioning profiles ==="
          cp ~/Library/MobileDevice/Provisioning\ Profiles/app.provisionprofile \
            "$APP_PATH/Contents/embedded.provisionprofile"
          cp ~/Library/MobileDevice/Provisioning\ Profiles/extension.provisionprofile \
            "$APP_PATH/Contents/PlugIns/Isometric Contributions Extension.appex/Contents/embedded.provisionprofile"

          echo "=== Unlocking keychain ==="
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "=== Building unsigned pkg ==="
          productbuild \
            --component "$APP_PATH" /Applications \
            IsometricContributions-unsigned.pkg
          echo "=== Unsigned pkg built ==="

          echo "=== Signing pkg ==="
          INSTALLER_IDENTITY="3rd Party Mac Developer Installer: Jason Long (DC57SSRSQE)"
          productsign \
            --sign "$INSTALLER_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            IsometricContributions-unsigned.pkg \
            IsometricContributions.pkg
          echo "=== Signed pkg built ==="

          ls -la IsometricContributions.pkg

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f IsometricContributions.pkg \
            --type macos \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf ~/.private_keys || true
